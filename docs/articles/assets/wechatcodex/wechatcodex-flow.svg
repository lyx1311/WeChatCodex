<svg width="1600" height="720" viewBox="0 0 1600 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="720" rx="36" fill="#F5F7FB"/>
  <text x="100" y="116" fill="#0F172A" font-size="52" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-weight="700">WeChatCodex 的消息链路</text>
  <text x="100" y="164" fill="#475569" font-size="24" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">没有 Gateway、没有公网 IP，直接把微信消息桥接到本机 Codex。</text>

  <rect x="100" y="258" width="236" height="232" rx="28" fill="#E8FFF1" stroke="#86EFAC" stroke-width="2"/>
  <rect x="392" y="258" width="236" height="232" rx="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="684" y="258" width="236" height="232" rx="28" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="976" y="258" width="236" height="232" rx="28" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
  <rect x="1268" y="258" width="236" height="232" rx="28" fill="#E8FFF1" stroke="#86EFAC" stroke-width="2"/>

  <path d="M336 374H372" stroke="#94A3B8" stroke-width="8" stroke-linecap="round"/>
  <path d="M360 358L384 374L360 390" stroke="#94A3B8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M628 374H664" stroke="#94A3B8" stroke-width="8" stroke-linecap="round"/>
  <path d="M652 358L676 374L652 390" stroke="#94A3B8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M920 374H956" stroke="#94A3B8" stroke-width="8" stroke-linecap="round"/>
  <path d="M944 358L968 374L944 390" stroke="#94A3B8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M1212 374H1248" stroke="#94A3B8" stroke-width="8" stroke-linecap="round"/>
  <path d="M1236 358L1260 374L1236 390" stroke="#94A3B8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="148" y="332" fill="#166534" font-size="26" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-weight="700">微信</text>
  <text x="148" y="380" fill="#166534" font-size="20" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">发文字、发图片、发命令</text>
  <text x="148" y="420" fill="#166534" font-size="20" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">用户只需要一个聊天框</text>

  <text x="440" y="332" fill="#0F172A" font-size="26" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-weight="700">微信协议层</text>
  <text x="440" y="380" fill="#334155" font-size="20" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">扫码绑定</text>
  <text x="440" y="414" fill="#334155" font-size="20" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">长轮询收消息</text>
  <text x="440" y="448" fill="#334155" font-size="20" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">下载并解密媒体</text>

  <text x="732" y="332" fill="#1D4ED8" font-size="26" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-weight="700">本地 daemon</text>
  <text x="732" y="380" fill="#1E3A8A" font-size="20" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">转成任务</text>
  <text x="732" y="414" fill="#1E3A8A" font-size="20" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">维护 thread_id 会话</text>
  <text x="732" y="448" fill="#1E3A8A" font-size="20" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">管理状态与日志</text>

  <text x="1024" y="332" fill="#9A3412" font-size="26" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-weight="700">Codex CLI</text>
  <text x="1024" y="380" fill="#9A3412" font-size="20" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">codex exec</text>
  <text x="1024" y="414" fill="#9A3412" font-size="20" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">codex exec resume</text>
  <text x="1024" y="448" fill="#9A3412" font-size="20" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">返回分析与执行结果</text>

  <text x="1316" y="332" fill="#166534" font-size="26" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-weight="700">回到微信</text>
  <text x="1316" y="380" fill="#166534" font-size="20" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">结果直接回聊天框</text>
  <text x="1316" y="414" fill="#166534" font-size="20" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">随手可用</text>

  <rect x="100" y="560" width="1404" height="76" rx="22" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="134" y="608" fill="#0F172A" font-size="24" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-weight="700">核心判断：</text>
  <text x="292" y="608" fill="#475569" font-size="24" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">把链路做短，个人开发者更容易跑通、维护和长期使用。</text>
</svg>
